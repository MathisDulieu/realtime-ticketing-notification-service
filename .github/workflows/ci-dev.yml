name: CI — Dev Branch

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test, Coverage & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Compile project
        run: mvn compile --no-transfer-progress

      - name: Run tests + verify JaCoCo coverage
        run: mvn verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          APP_VERSION: ${{ github.sha }}
          APP_ENVIRONMENT: test

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-dev-${{ github.sha }}
          path: target/site/jacoco/
          retention-days: 14

      - name: Verify JAR presence
        run: |
          JAR_FILE=$(find target -name "*.jar" -not -name "*sources*" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No JAR found after build"
            exit 1
          fi
          echo "✅ JAR found: $JAR_FILE"

      - name: Workflow summary
        if: always()
        run: |
          echo "## Dev CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: executed" >> $GITHUB_STEP_SUMMARY
          echo "- JaCoCo: report available in artifacts" >> $GITHUB_STEP_SUMMARY
