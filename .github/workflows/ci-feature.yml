name: CI — Feature Branch

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    name: Build, Test & Coverage Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Compile project
        run: mvn compile --no-transfer-progress

      - name: Run tests + verify JaCoCo coverage
        run: mvn verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          APP_VERSION: ${{ github.sha }}
          APP_ENVIRONMENT: test

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ github.sha }}
          path: target/site/jacoco/
          retention-days: 7

      - name: Coverage summary in job
        if: always()
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "✅ JaCoCo report generated: target/site/jacoco/index.html"
          else
            echo "❌ No JaCoCo report found"
          fi
