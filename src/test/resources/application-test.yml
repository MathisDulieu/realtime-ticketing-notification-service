# Server
server:
  port: 0

# Spring
spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

# Logging
logging:
  level:
    root: WARN
    com.mathisdulieu.ticketing: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Realtime
notification:
  kafka:
    groupId: notification_service_group_test
    topics:
      - json_realtime_reservation_confirmed_test
      - json_realtime_reservation_cancelled_test
      - json_realtime_reservation_failed_test
      - json_realtime_inventory_sold_out_test
      - json_realtime_inventory_low_stock_test
      - json_realtime_notification_send_test
